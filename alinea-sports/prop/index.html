            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1F2937;
                font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 0 24px;
                box-sizing: border-box;
            }

            .staticrypt-logo {
                display: block;
                width: 180px;
                margin: 0 auto 40px;
            }

            .staticrypt-form {
                background: #ffffff;
                border-radius: 12px;
                padding: 40px 32px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            }

            .staticrypt-title {
                font-family: 'Bebas Neue', sans-serif;
                font-size: 1.6em;
                color: #1F2937;
                margin: 0 0 4px;
                letter-spacing: 0.04em;
            }

            .staticrypt-instructions {
                margin: 0 0 24px;
            }

            .staticrypt-instructions p:last-child {
                font-size: 0.9em;
                color: #6B7280;
                margin: 0;
                line-height: 1.5;
            }

            .staticrypt-hr {
                display: none;
            }

            .staticrypt-password-container {
                position: relative;
                background: #F4F6F8;
                border: 1px solid #E5E7EB;
                border-radius: 8px;
                margin: 0 0 16px;
                transition: border-color 0.2s;
            }

            .staticrypt-password-container:focus-within {
                border-color: #6A1B9A;
                box-shadow: 0 0 0 3px rgba(106, 27, 154, 0.12);
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-size: 15px;
                font-family: system-ui, -apple-system, sans-serif;
                outline: 0;
                padding: 14px 44px 14px 16px;
                width: 100%;
                color: #1F2937;
            }

            .staticrypt-form input[type="password"]::placeholder,
            input[type="text"]::placeholder {
                color: #9CA3AF;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 0.4;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                transition: opacity 0.2s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.7;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Bebas Neue', sans-serif;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                outline: 0;
                background: #6A1B9A;
                width: 100%;
                border: 0;
                border-radius: 8px;
                padding: 14px;
                color: #ffffff;
                font-size: 16px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #58147F;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
                font-size: 0.85em;
                color: #6B7280;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 0.8em;
                accent-color: #6A1B9A;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1F2937;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid rgba(255, 255, 255, 0.3);
                border-right-color: #6A1B9A;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            .staticrypt-footer {
                text-align: center;
                margin-top: 32px;
                font-size: 0.75em;
                color: rgba(255, 255, 255, 0.25);
                letter-spacing: 0.06em;
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-form {
                    padding: 32px 24px;
                }
                .staticrypt-logo {
                    width: 140px;
                    margin-bottom: 32px;
                }
            }
        </style>
    </head>

                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
